# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.14
      uses: actions/setup-python@v3
      with:
        python-version: "3.14"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install poetry
        poetry install
    - name: Lint
      run: |
        poetry install --with lint
        poetry run pre-commit run -a
    - name: Test with pytest
      run: |
        poetry install --with test
        poetry run pytest -vv --cov=python_aes --cov-report term --cov-report xml:coverage.xml tests

  release:
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        run: poetry install --with lint
      - name: Configure git
        run: |
          git config user.email "tobiasw225@gmail.com"
          git config user.name "Tobias Wenzel"
      - name: Bump version and create tag
        run: |
          poetry run cz bump --changelog --yes --no-verify
          git push --follow-tags
